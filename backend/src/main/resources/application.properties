# Smart Parking System - Application Properties
# =============================================

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/smart_parking?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Application Configuration
app.auth.secret-key=dev-secret-key-change-in-production
app.auth.jwt-expiration-ms=86400000

# Twilio SMS Configuration (TODO: Set your credentials)
app.twilio.account-sid=
app.twilio.auth-token=
app.twilio.phone-number=

# Stripe Payment Configuration (TODO: Set your credentials)
app.stripe.secret-key=
app.stripe.publishable-key=

# AI Configuration
app.ai-data-refresh-interval=10

# Logging
logging.level.root=INFO
logging.level.com.smartparking=DEBUG

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=true
