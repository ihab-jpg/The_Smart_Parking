<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Parking System - Find Spot</title>
    <link rel="stylesheet" href="../static/css/styles.css">
</head>
<body>
    <div class="main-container">
        <!-- Navigation Bar -->
        <nav class="navbar">
            <div class="nav-brand">Smart Parking</div>
            <div class="nav-items">
                <a href="#" class="nav-link">Dashboard</a>
                <a href="#" class="nav-link">My Parking</a>
                <a href="#" class="nav-link">History</a>
                <a href="#" class="nav-link">Settings</a>
                <button id="logout-btn" class="btn-secondary">Logout</button>
            </div>
        </nav>

        <div class="content-wrapper">
            <!-- Sidebar - Parking Lot Selection & Filters -->
            <aside class="sidebar">
                <h3>Find a Spot</h3>

                <!-- Lot Selection -->
                <div class="filter-group">
                    <label for="lot-select">Parking Lot:</label>
                    <select id="lot-select">
                        <option value="">Select a lot...</option>
                        <!-- TODO: Populate from API /spots/lots -->
                    </select>
                </div>

                <!-- Level Selection -->
                <div class="filter-group">
                    <label for="level-select">Level:</label>
                    <select id="level-select" disabled>
                        <option value="">Select level...</option>
                        <!-- TODO: Populate based on selected lot -->
                    </select>
                </div>

                <!-- User Preferences Display -->
                <div class="filter-group">
                    <label>Your Preferences:</label>
                    <div id="preferences-display" class="preferences-list">
                        <!-- TODO: Display from user profile -->
                    </div>
                    <button id="edit-preferences-btn" class="btn-secondary">Edit Preferences</button>
                </div>

                <!-- Filter Options -->
                <div class="filter-group">
                    <label>Spot Type:</label>
                    <div class="checkbox-group">
                        <label><input type="checkbox" name="spot-type" value="regular" checked> Regular</label>
                        <label><input type="checkbox" name="spot-type" value="vip"> VIP</label>
                        <label><input type="checkbox" name="spot-type" value="disabled"> Disabled</label>
                    </div>
                </div>

                <div class="filter-group">
                    <label>Additional Filters:</label>
                    <div class="checkbox-group">
                        <label><input type="checkbox" name="near-entrance"> Near Entrance</label>
                        <label><input type="checkbox" name="covered"> Covered</label>
                    </div>
                </div>

                <!-- Search Button -->
                <button id="search-spots-btn" class="btn-primary">Search Available Spots</button>

                <!-- Auto-suggestions based on preferences -->
                <div id="auto-suggestions" class="suggestions-container" style="display: none;">
                    <h4>Recommended for You:</h4>
                    <div id="suggestions-list" class="suggestions-list">
                        <!-- TODO: Display ranked list of spots -->
                    </div>
                </div>
            </aside>

            <!-- Main Content - Map & Spot Details -->
            <main class="main-content">
                <!-- 2D Map Area -->
                <div class="map-container">
                    <div class="map-controls">
                        <button id="zoom-in-btn" class="btn-small">+</button>
                        <button id="zoom-out-btn" class="btn-small">−</button>
                        <button id="reset-map-btn" class="btn-small">Reset</button>
                        <label>
                            <input type="checkbox" id="auto-refresh-toggle" checked>
                            Auto-refresh
                        </label>
                    </div>

                    <!-- 2D Map Canvas -->
                    <canvas id="parking-map" width="800" height="600"></canvas>
                </div>

                <!-- Spot Details & Action Panel -->
                <div class="spot-details-panel">
                    <h3 id="selected-spot-title">No spot selected</h3>
                    
                    <div id="spot-info" class="spot-info" style="display: none;">
                        <div class="info-row">
                            <span class="info-label">Spot Number:</span>
                            <span id="spot-number" class="info-value">—</span>
                        </div>

                        <div class="info-row">
                            <span class="info-label">Level:</span>
                            <span id="spot-level" class="info-value">—</span>
                        </div>

                        <div class="info-row">
                            <span class="info-label">Status:</span>
                            <span id="spot-status" class="info-value">—</span>
                        </div>

                        <div class="info-row">
                            <span class="info-label">Distance to Entrance:</span>
                            <span id="spot-distance" class="info-value">—</span>
                        </div>

                        <div class="info-row">
                            <span class="info-label">Average Rating:</span>
                            <span id="spot-rating" class="info-value">—</span>
                        </div>

                        <div class="info-row">
                            <span class="info-label">Hourly Rate:</span>
                            <span id="spot-rate" class="info-value">—</span>
                        </div>

                        <!-- Path Drawing -->
                        <div id="path-info" class="path-info" style="display: none;">
                            <h4>Route to Spot:</h4>
                            <p id="path-description">—</p>
                            <canvas id="path-canvas" width="300" height="300"></canvas>
                        </div>

                        <!-- Spot Reviews -->
                        <div id="spot-reviews" class="reviews-section" style="display: none;">
                            <h4>Reviews:</h4>
                            <div id="reviews-list" class="reviews-list">
                                <!-- TODO: Populate from API -->
                            </div>
                        </div>

                        <!-- Reserve Button -->
                        <button id="reserve-spot-btn" class="btn-primary" disabled>Reserve This Spot</button>
                    </div>

                    <!-- Loading State -->
                    <div id="loading-spinner" class="spinner" style="display: none;">
                        Loading...
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Modal: Preferences Editor -->
    <div id="preferences-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Edit Your Preferences</h2>
            <form id="preferences-form">
                <!-- TODO: Implement preferences form -->
                <button type="submit" class="btn-primary">Save Preferences</button>
            </form>
        </div>
    </div>

    <!-- Modal: Confirm Reservation -->
    <div id="reservation-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Confirm Reservation</h2>
            <div id="reservation-summary">
                <!-- TODO: Display spot details and cost estimate -->
            </div>
            <button id="confirm-reserve-btn" class="btn-primary">Confirm & Reserve</button>
            <button class="btn-secondary close-btn">Cancel</button>
        </div>
    </div>

    <script src="../static/js/api.js"></script>
    <script src="../static/js/map.js"></script>
    <script src="../static/js/preferences.js"></script>

</body>
</html>
